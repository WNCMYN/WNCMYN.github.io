<script>
function openNav() {
    document.getElementById("sideNavigation").style.width = "250px";
    document.getElementById("main").style.marginLeft = "250px";
}

function closeNav() {
    document.getElementById("sideNavigation").style.width = "0";
    document.getElementById("main").style.marginLeft = "0";
}

function showOptions() {
    var options = document.getElementById("options");
    if (options.style.display === "none") {
        options.style.display = "block";
    } else {
        options.style.display = "none";
    }
}
const menuDeroulant = document.getElementById("menuDeroulant");
menuDeroulant.addEventListener("change", function() {
  const choix = menuDeroulant.value;
  console.log("Vous avez choisi : " + choix);
});

function LightMode () {
	document.body.style.background = "linear-gradient(90deg, rgba(0,0,0,1) 5%, rgba(8,7,7,1) 10%, rgba(23,23,23,1) 18%, rgba(153,153,153,1) 45%, rgba(153,153,153,1) 55%, rgba(23,23,23,1) 82%, rgba(8,7,7,1) 90%, rgba(0,0,0,1) 95%)"; 
	document.getElementById("turn").src="img/turn0vers1.PNG";
	document.body.style.color="black";

}
function BlackMode () {
	document.body.style.background = "linear-gradient(90deg, rgba(153,153,153,1) 5%, rgba(24,21,21,1) 33%, rgba(8,7,7,1) 40%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(8,7,7,1) 60%, rgba(23,23,23,1) 67%, rgba(153,153,153,1) 95%)"; 
	document.getElementById("turn").src="turn0vers.JPG";
	document.body.style.color="white";
}
</script>
